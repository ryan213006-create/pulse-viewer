<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PULSE 院前實證知識庫</title>
<style>
  :root{
    --bg:#0e1417; --panel:#131c21; --panel2:#18242a; --line:#25353d;
    --ink:#e7f0ef; --ink2:#9fb2b0; --ink3:#6b807e;
    --signal:#3fe0a0; --signal-dim:#1c8f68;
    --amber:#f2b447; --rose:#f2657a; --sky:#63b8e8;
    --mono:'SF Mono',ui-monospace,'Cascadia Code','Consolas',monospace;
    --sans:-apple-system,'Segoe UI','Noto Sans TC',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);
    line-height:1.6;-webkit-font-smoothing:antialiased}
  ::selection{background:var(--signal-dim);color:#fff}

  /* ---- header ---- */
  header{border-bottom:1px solid var(--line);padding:22px 28px 18px;
    display:flex;align-items:baseline;gap:18px;flex-wrap:wrap;
    background:linear-gradient(180deg,#101a1f,#0e1417)}
  .logo{font-family:var(--mono);font-size:22px;font-weight:700;letter-spacing:2px;
    color:var(--signal)}
  .logo b{color:var(--ink)}
  .tagline{color:var(--ink3);font-size:13px;font-family:var(--mono)}
  .pulse-line{flex:1;min-width:60px;height:22px;opacity:.5}
  .stamp{font-family:var(--mono);font-size:12px;color:var(--ink3);text-align:right}
  .stamp b{color:var(--ink2)}

  /* ---- layout ---- */
  .wrap{display:grid;grid-template-columns:264px 1fr;gap:0;min-height:calc(100vh - 80px)}
  aside{border-right:1px solid var(--line);padding:22px 20px;
    position:sticky;top:0;align-self:start;max-height:100vh;overflow-y:auto}
  main{padding:22px 28px 80px}

  /* ---- filters ---- */
  .fgroup{margin-bottom:22px}
  .flabel{font-family:var(--mono);font-size:11px;letter-spacing:1.5px;
    text-transform:uppercase;color:var(--ink3);margin-bottom:9px;display:block}
  .search{width:100%;background:var(--panel2);border:1px solid var(--line);
    border-radius:8px;color:var(--ink);padding:10px 12px;font-size:14px;
    font-family:var(--sans);outline:none;transition:border-color .15s}
  .search:focus{border-color:var(--signal-dim)}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{font-size:12.5px;padding:5px 10px;border-radius:20px;cursor:pointer;
    background:var(--panel2);border:1px solid var(--line);color:var(--ink2);
    transition:all .12s;user-select:none;white-space:nowrap}
  .chip:hover{border-color:var(--signal-dim);color:var(--ink)}
  .chip.on{background:var(--signal-dim);border-color:var(--signal);color:#eafff6;font-weight:600}
  .chip .n{font-family:var(--mono);opacity:.6;font-size:11px;margin-left:3px}

  .seg{display:flex;gap:4px}
  .seg button{flex:1;background:var(--panel2);border:1px solid var(--line);
    color:var(--ink2);font-family:var(--mono);font-size:12px;padding:7px 0;
    border-radius:6px;cursor:pointer;transition:all .12s}
  .seg button:hover{color:var(--ink)}
  .seg button.on{background:var(--signal-dim);border-color:var(--signal);color:#eafff6}

  .reset{width:100%;margin-top:6px;background:transparent;border:1px solid var(--line);
    color:var(--ink3);font-size:12.5px;padding:8px;border-radius:7px;cursor:pointer;
    font-family:var(--mono);transition:all .12s}
  .reset:hover{border-color:var(--rose);color:var(--rose)}

  /* ---- toolbar ---- */
  .toolbar{display:flex;align-items:center;gap:14px;margin-bottom:16px;flex-wrap:wrap}
  .count{font-family:var(--mono);font-size:14px;color:var(--ink2)}
  .count b{color:var(--signal);font-size:19px}
  .sortsel{margin-left:auto;display:flex;align-items:center;gap:8px}
  .sortsel span{font-family:var(--mono);font-size:11px;color:var(--ink3);letter-spacing:1px}
  .sortsel select{background:var(--panel2);border:1px solid var(--line);color:var(--ink);
    padding:7px 10px;border-radius:7px;font-size:13px;font-family:var(--sans);cursor:pointer;outline:none}

  /* ---- card ---- */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:16px 18px;margin-bottom:12px;cursor:pointer;transition:border-color .14s,transform .14s;
    position:relative;overflow:hidden}
  .card:hover{border-color:var(--signal-dim);transform:translateX(2px)}
  .card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
    background:var(--edge,var(--line))}
  .card.q5{--edge:var(--signal)} .card.q4{--edge:var(--signal-dim)}
  .card.q3{--edge:var(--amber)} .card.q2{--edge:#a07a2a} .card.q1{--edge:var(--ink3)}

  .ctop{display:flex;align-items:flex-start;gap:12px;margin-bottom:9px}
  .ctitlewrap{flex:1}
  .ctitle{font-size:15.5px;font-weight:600;color:var(--ink);line-height:1.45}
  .ctitle-zh{font-size:13.5px;color:var(--ink2);line-height:1.5;margin-top:3px}
  .src{font-family:var(--mono);font-size:10.5px;padding:2px 7px;border-radius:4px;
    background:rgba(99,184,232,.12);color:var(--sky);border:1px solid #2a4b5c;
    flex-shrink:0;letter-spacing:.3px}
  .qdots{display:flex;gap:3px;flex-shrink:0;padding-top:4px}
  .qdot{width:7px;height:7px;border-radius:50%;background:var(--line)}
  .qdot.fill{background:var(--signal)}
  .qflag{font-family:var(--mono);font-size:10px;color:var(--amber);
    border:1px solid var(--amber);border-radius:4px;padding:1px 5px;flex-shrink:0}

  .cmeta{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-bottom:8px}
  .tag{font-family:var(--mono);font-size:11.5px;padding:2px 8px;border-radius:5px;
    background:var(--panel2);color:var(--ink2);border:1px solid var(--line)}
  .tag.design{color:var(--sky);border-color:#2a4b5c}
  .tag.topic{color:var(--signal);border-color:var(--signal-dim)}
  .cjournal{font-size:12.5px;color:var(--ink3);font-style:italic}

  .crel{display:flex;gap:16px;font-family:var(--mono);font-size:11px;color:var(--ink3)}
  .crel b{color:var(--ink2)}
  .bar{display:inline-flex;gap:2px;margin-left:4px;vertical-align:middle}
  .bseg{width:9px;height:6px;border-radius:1px;background:var(--line)}
  .bseg.c{background:var(--rose)} .bseg.e{background:var(--sky)}

  /* ---- detail panel ---- */
  .overlay{position:fixed;inset:0;background:rgba(6,10,12,.72);backdrop-filter:blur(3px);
    z-index:50;opacity:0;pointer-events:none;transition:opacity .2s}
  .overlay.on{opacity:1;pointer-events:auto}
  .detail{position:fixed;top:0;right:0;bottom:0;width:min(560px,92vw);
    background:var(--panel);border-left:1px solid var(--line);z-index:51;
    transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);
    overflow-y:auto;padding:26px 28px 60px}
  .detail.on{transform:translateX(0)}
  .dclose{position:absolute;top:20px;right:22px;background:var(--panel2);
    border:1px solid var(--line);color:var(--ink2);width:34px;height:34px;
    border-radius:8px;cursor:pointer;font-size:18px;line-height:1;transition:all .12s}
  .dclose:hover{border-color:var(--rose);color:var(--rose)}
  .dpmid{font-family:var(--mono);font-size:12px;color:var(--ink3);margin-bottom:6px}
  .dtitle{font-size:19px;font-weight:700;line-height:1.4;margin-bottom:6px;padding-right:40px}
  .dtitle-zh{font-size:15px;color:var(--ink2);line-height:1.5;margin-bottom:10px;padding-right:40px}
  .djournal{font-size:13px;color:var(--ink2);font-style:italic;margin-bottom:18px}
  .dsrc{display:inline-block;font-family:var(--mono);font-size:11px;padding:2px 8px;
    border-radius:4px;background:rgba(99,184,232,.12);color:var(--sky);
    border:1px solid #2a4b5c;margin-left:8px;font-style:normal;vertical-align:middle}
  .dsection{margin-bottom:18px;padding-bottom:18px;border-bottom:1px solid var(--line)}
  .dsection:last-child{border-bottom:none}
  .dh{font-family:var(--mono);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;
    color:var(--signal);margin-bottom:9px}
  .drow{display:flex;gap:12px;margin-bottom:7px;font-size:13.5px}
  .dk{color:var(--ink3);flex-shrink:0;width:82px;font-size:12.5px;padding-top:1px}
  .dv{color:var(--ink);flex:1}
  .dv.mono{font-family:var(--mono);font-size:12.5px;color:var(--signal)}
  .dquote{background:var(--panel2);border-left:2px solid var(--signal-dim);
    padding:9px 12px;border-radius:0 6px 6px 0;font-size:13px;color:var(--ink2);
    line-height:1.55;margin-top:4px}
  .dfind{list-style:none}
  .dfind li{padding:7px 0 7px 18px;position:relative;font-size:13.5px;
    border-bottom:1px solid var(--panel2);font-family:var(--mono);line-height:1.5}
  .dfind li:last-child{border-bottom:none}
  .dfind li::before{content:'▸';position:absolute;left:0;color:var(--signal)}
  .dlim{font-size:13px;margin-bottom:8px}
  .dlim .lk{color:var(--rose);font-family:var(--mono);font-size:11px;
    text-transform:uppercase;letter-spacing:.5px}
  .dlim .lv{color:var(--ink2);line-height:1.5}
  .dlink{display:inline-flex;align-items:center;gap:6px;margin-top:4px;
    font-family:var(--mono);font-size:12.5px;color:var(--sky);text-decoration:none;
    border:1px solid #2a4b5c;padding:7px 12px;border-radius:7px;transition:all .12s}
  .dlink:hover{background:var(--panel2);border-color:var(--sky)}
  .dtag{font-family:var(--mono);font-size:12px;padding:3px 9px;border-radius:5px;
    background:var(--panel2);color:var(--signal);border:1px solid var(--signal-dim);
    margin:0 5px 5px 0;display:inline-block}

  .empty{text-align:center;padding:80px 20px;color:var(--ink3);font-family:var(--mono)}
  .empty b{color:var(--ink2);display:block;font-size:16px;margin-bottom:6px}

  .footnote{margin-top:32px;padding-top:18px;border-top:1px solid var(--line);
    font-size:12px;color:var(--ink3);line-height:1.7;font-family:var(--mono)}
  .footnote b{color:var(--ink2)}

  /* ---- responsive ---- */
  @media(max-width:820px){
    .wrap{grid-template-columns:1fr}
    aside{position:static;max-height:none;border-right:none;border-bottom:1px solid var(--line)}
    header{padding:16px 18px}
    main{padding:18px}
  }
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<header>
  <div class="logo">PULSE<b>·</b><span style="font-size:14px;font-weight:400;letter-spacing:0;color:var(--ink2)">院前實證知識庫</span></div>
  <svg class="pulse-line" viewBox="0 0 200 22" preserveAspectRatio="none">
    <polyline points="0,11 40,11 48,11 54,3 60,19 66,6 72,11 110,11 118,11 124,4 130,18 136,11 200,11"
      fill="none" stroke="var(--signal)" stroke-width="1.5"/>
  </svg>
  <div class="stamp">資料快照 <b id="stamp-date">—</b><br>共 <b id="stamp-total">—</b> 篇入庫</div>
</header>

<div class="wrap">
  <aside>
    <div class="fgroup">
      <label class="flabel">關鍵字（標題）</label>
      <input class="search" id="q" placeholder="中英文關鍵字皆可…" autocomplete="off">
    </div>
    <div class="fgroup">
      <label class="flabel">主題</label>
      <div class="chips" id="f-topic"></div>
    </div>
    <div class="fgroup">
      <label class="flabel">研究設計</label>
      <div class="chips" id="f-design"></div>
    </div>
    <div class="fgroup">
      <label class="flabel">品質分數（≥）</label>
      <div class="seg" id="f-quality">
        <button data-v="0" class="on">全部</button>
        <button data-v="3">≥3</button>
        <button data-v="4">≥4</button>
        <button data-v="5">5</button>
      </div>
    </div>
    <div class="fgroup">
      <label class="flabel">臨床相關（≥）</label>
      <div class="seg" id="f-clin">
        <button data-v="0" class="on">全部</button>
        <button data-v="1">≥1</button>
        <button data-v="2">≥2</button>
        <button data-v="3">3</button>
      </div>
    </div>
    <div class="fgroup">
      <label class="flabel">教育相關（≥）</label>
      <div class="seg" id="f-edu">
        <button data-v="0" class="on">全部</button>
        <button data-v="1">≥1</button>
        <button data-v="2">≥2</button>
        <button data-v="3">3</button>
      </div>
    </div>
    <div class="fgroup">
      <div class="seg" id="f-review" style="margin-bottom:8px">
        <button data-v="0" class="on">不限複核</button>
        <button data-v="1">僅待複核</button>
      </div>
      <button class="reset" id="reset">✕ 清除所有篩選</button>
    </div>
  </aside>

  <main>
    <div class="toolbar">
      <div class="count"><b id="cnt">0</b> / <span id="cnt-total">0</span> 篇符合</div>
      <div class="sortsel">
        <span>排序</span>
        <select id="sort">
          <option value="quality">品質分數 高→低</option>
          <option value="clin">臨床相關 高→低</option>
          <option value="edu">教育相關 高→低</option>
          <option value="year">出版年 新→舊</option>
          <option value="pmid">PMID</option>
        </select>
      </div>
    </div>
    <div id="list"></div>
    <div class="footnote" id="foot"></div>
  </main>
</div>

<div class="overlay" id="overlay"></div>
<div class="detail" id="detail"></div>

    clin:(a,b)=>(b.rel_clinical||0)-(a.rel_clinical||0)||(b.quality||0)-(a.quality||0),
    edu:(a,b)=>(b.rel_education||0)-(a.rel_education||0)||(b.quality||0)-(a.quality||0),
    year:(a,b)=>(b.year||0)-(a.year||0),
    pmid:(a,b)=>(''+a.pmid).localeCompare(''+b.pmid),
  };

  function qdots(n){
    n=n||0; let h='<div class="qdots" title="品質 '+(n||'—')+'/5">';
    for(let i=1;i<=5;i++) h+='<div class="qdot'+(i<=n?' fill':'')+'"></div>';
    return h+'</div>';
  }
  function relBar(n,cls){
    n=n||0; let h='<span class="bar">';
    for(let i=1;i<=3;i++) h+='<span class="bseg'+(i<=n?' '+cls:'')+'"></span>';
    return h+'</span>';
  }
  function esc(s){return (s==null?'':''+s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

  function render(){
    const rows=PULSE_DATA.filter(match).sort(sorters[state.sort]);
    $('#cnt').textContent=rows.length;
    const list=$('#list');
    if(!rows.length){
      list.innerHTML='<div class="empty"><b>沒有符合的文獻</b>試著放寬篩選條件，或按左下角清除。</div>';
      renderFoot(rows); return;
    }
    list.innerHTML=rows.map(a=>{
      const topics=a.topics.slice(0,3).map(t=>'<span class="tag topic">'+esc(t)+'</span>').join('');
      const flag=a.review?'<span class="qflag">待複核</span>':'';
      const zh=a.title_zh?'<div class="ctitle-zh">'+esc(a.title_zh)+'</div>':'';
      const src=a.source?'<span class="src">'+esc(a.source)+'</span>':'';
      return '<div class="card q'+(a.quality||1)+'" data-pmid="'+a.pmid+'">'+
        '<div class="ctop"><div class="ctitlewrap"><div class="ctitle">'+esc(a.title)+'</div>'+zh+'</div>'+
        src+flag+qdots(a.quality)+'</div>'+
        '<div class="cmeta"><span class="tag design">'+esc(a.design_label)+'</span>'+
        topics+'<span class="cjournal">'+esc(a.journal)+(a.year?' · '+a.year:'')+'</span></div>'+
        '<div class="crel">臨床'+relBar(a.rel_clinical,'c')+
        '　教育'+relBar(a.rel_education,'e')+
        (a.sample_size?'　<span>n='+a.sample_size+'</span>':'')+'</div>'+
        '</div>';
    }).join('');
    list.querySelectorAll('.card').forEach(c=>c.onclick=()=>openDetail(c.dataset.pmid));
    renderFoot(rows);
  }

  function renderFoot(rows){
    const dbl=PULSE_DATA.filter(a=>!a.rel_clinical&&!a.rel_education).length;
    $('#foot').innerHTML='PULSE 資料快照 '+PULSE_META.generated+
      '　·　資料來源：PubMed　·　中文標題為輔助參考，以原文為準　·　僅供院前實證檢索，非臨床決策依據<br>'+
      '此頁為離線快照，資料更新需重新產生；每週新文獻請重跑匯出。'+
      '（本批 '+PULSE_META.total+' 篇中，範圍外沉底 '+dbl+' 篇）';
  }

  function openDetail(pmid){
    const a=PULSE_DATA.find(x=>''+x.pmid===''+pmid); if(!a) return;
    const lim=a.limitations||{};
    const limMap={selection_bias:'選擇偏誤',confounding:'干擾因子',missing_data:'資料缺失',other:'其他限制'};
    let limHtml='';
    Object.keys(limMap).forEach(k=>{
      if(lim[k]) limHtml+='<div class="dlim"><span class="lk">'+limMap[k]+'</span>　<span class="lv">'+esc(lim[k])+'</span></div>';
    });
    let findHtml='';
    if(a.key_findings&&a.key_findings.length)
      findHtml='<ul class="dfind">'+a.key_findings.map(f=>'<li>'+esc(f)+'</li>').join('')+'</ul>';

    const doiLink=a.doi?'<a class="dlink" href="https://doi.org/'+esc(a.doi)+'" target="_blank" rel="noopener">DOI 原文 ↗</a>':'';
    const pubmedLink='<a class="dlink" href="https://pubmed.ncbi.nlm.nih.gov/'+esc(a.pmid)+'" target="_blank" rel="noopener" style="margin-left:8px">PubMed ↗</a>';

    $('#detail').innerHTML=
      '<button class="dclose" id="dclose">✕</button>'+
      '<div class="dpmid">PMID '+esc(a.pmid)+(a.source?'<span class="dsrc">'+esc(a.source)+'</span>':'')+(a.review?'　·　⚠ 待人工複核':'')+'</div>'+
      '<div class="dtitle">'+esc(a.title)+'</div>'+
      (a.title_zh?'<div class="dtitle-zh">'+esc(a.title_zh)+'</div>':'')+
      '<div class="djournal">'+esc(a.journal)+(a.year?'　·　'+a.year:'')+'</div>'+

      '<div class="dsection"><div class="dh">研究設計</div>'+
      '<div class="drow"><div class="dk">設計</div><div class="dv">'+esc(a.design_label)+
      qdotsInline(a.quality)+'</div></div>'+
      (a.design_evidence?'<div class="dquote">'+esc(a.design_evidence)+'</div>':'')+
      (a.quality_rationale?'<div class="drow" style="margin-top:8px"><div class="dk">評分理由</div><div class="dv">'+esc(a.quality_rationale)+'</div></div>':'')+
      '</div>'+

      '<div class="dsection"><div class="dh">主題與相關性</div>'+
      '<div style="margin-bottom:10px">'+a.topics.map(t=>'<span class="dtag">'+esc(t)+'</span>').join('')+'</div>'+
      '<div class="drow"><div class="dk">臨床相關</div><div class="dv">'+relBarBig(a.rel_clinical,'c')+'</div></div>'+
      '<div class="drow"><div class="dk">教育相關</div><div class="dv">'+relBarBig(a.rel_education,'e')+'</div></div>'+
      '</div>'+

      '<div class="dsection"><div class="dh">族群</div>'+
      row('樣本數',a.sample_size!=null?'n = '+a.sample_size:'—',true)+
      row('年齡層',a.age_group||'—')+
      row('場域',a.setting||'—')+
      row('國家',a.country||'—')+
      '</div>'+

      '<div class="dsection"><div class="dh">結果</div>'+
      row('主要結局',a.primary_outcome||'—')+
      (a.effect_size?row('效果量',a.effect_size,true):'')+
      (findHtml?'<div class="dh" style="margin-top:12px;color:var(--ink3)">關鍵數據</div>'+findHtml:'')+
      '</div>'+

      (a.methods&&a.methods.length?'<div class="dsection"><div class="dh">統計方法</div>'+
      '<div>'+a.methods.map(m=>'<span class="dtag">'+esc(m)+'</span>').join('')+'</div></div>':'')+

      (limHtml?'<div class="dsection"><div class="dh">限制與偏誤</div>'+limHtml+'</div>':'')+

      (a.scope_note?'<div class="dsection"><div class="dh">範圍註記</div><div class="dv" style="font-size:13px;color:var(--ink2)">'+esc(a.scope_note)+'</div></div>':'')+

      '<div class="dsection" style="border:none">'+doiLink+pubmedLink+'</div>';

    $('#dclose').onclick=closeDetail;
    $('#overlay').classList.add('on');
    $('#detail').classList.add('on');
    $('#detail').scrollTop=0;
  }
  function row(k,v,mono){return '<div class="drow"><div class="dk">'+k+'</div><div class="dv'+(mono?' mono':'')+'">'+esc(v)+'</div></div>';}
  function qdotsInline(n){n=n||0;let h='<span style="margin-left:10px;vertical-align:middle">';for(let i=1;i<=5;i++)h+='<span style="display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:3px;background:'+(i<=n?'var(--signal)':'var(--line)')+'"></span>';return h+'</span>';}
  function relBarBig(n,cls){n=n||0;let h='<span style="display:inline-flex;gap:3px;vertical-align:middle">';const col=cls==='c'?'var(--rose)':'var(--sky)';for(let i=1;i<=3;i++)h+='<span style="width:26px;height:8px;border-radius:2px;background:'+(i<=n?col:'var(--line)')+'"></span>';return h+'</span> <span style="font-family:var(--mono);font-size:12px;color:var(--ink3);margin-left:6px">'+n+'/3</span>';}

  function closeDetail(){$('#overlay').classList.remove('on');$('#detail').classList.remove('on');}
  $('#overlay').onclick=closeDetail;
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDetail();});

  render();
})();
</script>
</body>
</html>
